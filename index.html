<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="description" content="控制台 个人控制台">
    <title>控制台 · 控制台</title>
    <link rel="icon" href="favicon.ico">

    <!-- ============================================================
         样式：按层级加载
         1. katex.min.css    —— KaTeX 数学公式样式（本地）
         2. github-markdown.min.css —— GitHub 风格 Markdown 样式（本地）
         3. style.css        —— 全站统一响应式样式
         ============================================================ -->
    <link rel="stylesheet" href="lib/katex.min.css">
    <link rel="stylesheet" href="lib/github-markdown.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================================
         顶部导航栏
         包含：品牌标题、主题切换按钮
         ============================================================ -->
    <header class="header" id="header">
        <div class="header-brand">
            <span class="brand-icon">🏠</span>
            <span>控制台</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggleBtn" title="切换主题" aria-label="切换深色/浅色主题">🌙</button>
    </header>

    <div class="app-container">

        <!-- ============================================================
             标签页切换栏（PC / 平板——顶部显示；移动端——底部固定栏）
             ============================================================ -->
        <nav class="tab-bar" id="tabBar">
            <button class="tab-btn active" data-tab="dashboard">
                <span class="tab-icon">📊</span> <span>仪表盘</span>
            </button>
            <button class="tab-btn" data-tab="nav">
                <span class="tab-icon">🧭</span> <span>导航</span>
            </button>
            <button class="tab-btn" data-tab="blog">
                <span class="tab-icon">📝</span> <span>博客</span>
            </button>
            <button class="tab-btn" data-tab="gallery">
                <span class="tab-icon">🖼️</span> <span>图库</span>
            </button>
        </nav>

        <!-- ============================================================
             内容区：每个 section 对应一个功能模块
             app.js 根据标签切换显示 / 隐藏
             ============================================================ -->

        <!-- 仪表盘：系统资源监控 -->
        <section class="content-section active" id="sec-dashboard">

            <!-- 仪表盘卡片网格：由 dashboard.js 动态填充 -->
            <div class="dashboard-grid" id="dashboardGrid">
                <div class="dash-card">
                    <div class="dash-icon">🧠</div>
                    <div class="dash-info">
                        <div class="dash-label">CPU</div>
                        <div class="dash-value" id="cpuValue">--</div>
                    </div>
                    <div class="dash-bar"><div class="dash-fill" id="cpuFill"></div></div>
                </div>
                <div class="dash-card">
                    <div class="dash-icon">💾</div>
                    <div class="dash-info">
                        <div class="dash-label">内存</div>
                        <div class="dash-value" id="memValue">--</div>
                    </div>
                    <div class="dash-bar"><div class="dash-fill" id="memFill"></div></div>
                </div>
                <div class="dash-card">
                    <div class="dash-icon">🗄️</div>
                    <div class="dash-info">
                        <div class="dash-label">磁盘</div>
                        <div class="dash-value" id="diskValue">--</div>
                    </div>
                    <div class="dash-bar"><div class="dash-fill" id="diskFill"></div></div>
                </div>
                <div class="dash-card">
                    <div class="dash-icon">⏱️</div>
                    <div class="dash-info">
                        <div class="dash-label">运行时间</div>
                        <div class="dash-value" id="uptimeValue">--</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 服务导航：替代原 Homer iframe，由 navigation.js 渲染 -->
        <section class="content-section" id="sec-nav">
            <div class="section-search">
                <input type="text" class="search-input" id="navSearch"
                       placeholder="搜索服务…" autocomplete="off">
            </div>
            <div class="nav-grid" id="navGrid">
                <div class="nav-empty">加载中...</div>
            </div>
        </section>

        <!-- 博客文章列表：由 blog.js 渲染 -->
        <section class="content-section" id="sec-blog">
            <div class="section-search">
                <input type="text" class="search-input" id="blogSearch"
                       placeholder="搜索文章…" autocomplete="off">
                <div class="blog-tabs" id="blogTabs">
                    <button class="blog-tab active" data-type="all">全部</button>
                    <button class="blog-tab" data-type="markdown">Markdown</button>
                    <button class="blog-tab" data-type="html">HTML</button>
                </div>
            </div>
            <div class="blog-list" id="blogList">
                <div class="blog-loading">加载中...</div>
            </div>
        </section>

        <!-- 图片画廊：由 gallery.js 渲染 -->
        <section class="content-section" id="sec-gallery">
            <div class="section-search">
                <input type="text" class="search-input" id="gallerySearch"
                       placeholder="搜索图片…" autocomplete="off">
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <div class="gallery-loading">加载中...</div>
            </div>
        </section>
    </div>

    <!-- ============================================================
         底部导航栏（仅移动端显示，由 app.js 控制）
         ============================================================ -->
    <nav class="bottom-nav" id="bottomNav" style="display:none;">
        <button class="tab-btn active" data-tab="dashboard">
            <span class="tab-icon">📊</span> <span>仪表盘</span>
        </button>
        <button class="tab-btn" data-tab="nav">
            <span class="tab-icon">🧭</span> <span>导航</span>
        </button>
        <button class="tab-btn" data-tab="blog">
            <span class="tab-icon">📝</span> <span>博客</span>
        </button>
        <button class="tab-btn" data-tab="gallery">
            <span class="tab-icon">🖼️</span> <span>图库</span>
        </button>
    </nav>

    <!-- ============================================================
         图片灯箱（全局，被 gallery.js 和 lightbox.js 使用）
         ============================================================ -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" aria-label="关闭">✕</button>
        <img src="" alt="" id="lightboxImg">
        <div class="lightbox-name" id="lightboxName"></div>
    </div>

    <!-- ============================================================
         Markdown 阅读器覆盖层（全屏）
         由 md-viewer.js 控制打开 / 关闭
         ============================================================ -->
    <div class="md-overlay" id="mdOverlay">

        <!-- 阅读进度条 -->
        <div class="md-progress-bar" id="mdProgressBar"></div>

        <!-- TOC 侧边栏覆盖层 -->
        <div class="toc-overlay" id="tocOverlay"></div>

        <!-- TOC 侧边栏 -->
        <aside class="toc-sidebar" id="tocSidebar">
            <div class="toc-header">
                <span>📑 目录</span>
                <button class="toc-close-btn" id="tocCloseBtn" aria-label="关闭目录">✕</button>
            </div>
            <nav class="toc-nav" id="tocNav">
                <div class="toc-empty">加载中...</div>
            </nav>
        </aside>

        <!-- 阅读器顶部栏 -->
        <div class="md-topbar">
            <div class="md-topbar-left">
                <button class="md-btn" id="mdTocBtn" aria-label="目录">
                    <span class="md-btn-icon">☰</span> <span>目录</span>
                </button>
                <span class="md-topbar-title" id="mdTitle">加载中...</span>
            </div>
            <div class="md-topbar-right">
                <button class="md-btn" id="mdCloseBtn" aria-label="关闭">
                    <span class="md-btn-icon">✕</span> <span>关闭</span>
                </button>
            </div>
        </div>

        <!-- Markdown 内容滚动区 -->
        <div class="md-content-scroll">
            <div class="md-content-container">
                <div class="markdown-body" id="mdContent">
                    <div class="md-loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Markdown 内图片灯箱 -->
    <div class="md-lightbox" id="mdLightbox">
        <button class="md-lightbox-close" aria-label="关闭">✕</button>
        <img src="" alt="" id="mdLightboxImg">
        <div class="md-lightbox-name" id="mdLightboxName"></div>
    </div>

    <!-- ============================================================
         脚本加载区
         按依赖顺序加载：从无依赖到有依赖，app.js 最后加载作为引导入口
         ============================================================ -->

    <!-- 主题管理：无依赖，最先加载 -->
    <script src="js/theme.js"></script>

    <!-- 工具函数：无依赖 -->
    <script src="js/utils.js"></script>

    <!-- 图片灯箱：无依赖 -->
    <script src="js/lightbox.js"></script>

    <!-- 仪表盘：无依赖（直接操作 DOM） -->
    <script src="js/dashboard.js"></script>

    <!-- 服务导航：依赖 utils.js，读取 config.json -->
    <script src="js/navigation.js"></script>

    <!-- 博客列表：依赖 utils.js, md-viewer.js -->
    <script src="js/blog.js"></script>

    <!-- 图片画廊：依赖 utils.js, lightbox.js -->
    <script src="js/gallery.js"></script>

    <!-- Markdown 解析库：本地 marked.min.js -->
    <script src="lib/marked.min.js"></script>

    <!-- Markdown 阅读器：依赖 marked, utils.js, lightbox.js -->
    <script src="js/md-viewer.js"></script>

    <!-- 主控制器：依赖所有上述模块，最后加载 -->
    <script src="js/app.js"></script>

</body>
</html>
