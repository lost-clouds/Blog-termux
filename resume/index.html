<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="robots" content="noindex, nofollow">
    <title>个人简历</title>

    <!-- 阻止主题闪烁（FOLT）：在 CSS 加载前设置 data-theme -->
    <script>
      (function() {
        var t = localStorage.getItem('resume-theme');
        if (!t) {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <link rel="stylesheet" href="css/resume.css">
</head>
<body>
    <!-- 阻止主题闪烁：在 body 渲染前设置 dark 类 + meta theme-color -->
    <script>
      (function() {
        var t = document.documentElement.getAttribute('data-theme');
        if (t === 'dark') document.body.classList.add('dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', t === 'dark' ? '#1c1c1e' : '#f5f5f7');
      })();
    </script>

    <!-- 跳转到主内容（可访问性） -->
    <a href="#content" class="skip-link">跳到主内容</a>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-backdrop"></div>
        <div class="nav-container">
            <a href="#" class="nav-logo" aria-label="回到首页"></a>
            <div class="flex-grow"></div>
            <div class="nav-links">
                <a href="#about" class="nav-item">关于</a>
                <a href="#projects" class="nav-item">项目</a>
                <a href="#contact" class="nav-item">联系</a>
                <div class="nav-separator"></div>
                <a href="#" class="nav-item nav-social" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
                    <svg width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5c.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34c-.46-1.16-1.11-1.47-1.11-1.47c-.91-.62.07-.6.07-.6c1 .07 1.53 1.03 1.53 1.03c.87 1.52 2.34 1.07 2.91.83c.09-.65.35-1.09.63-1.34c-2.22-.25-4.55-1.11-4.55-4.92c0-1.11.38-2 1.03-2.71c-.1-.25-.45-1.29.1-2.64c0 0 .84-.27 2.75 1.02c.79-.22 1.65-.33 2.5-.33s1.71.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02c.55 1.35.2 2.39.1 2.64c.65.71 1.03 1.6 1.03 2.71c0 3.82-2.34 4.66-4.57 4.91c.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2"/></svg>
                </a>
                <button type="button" id="themeToggle" class="nav-item theme-toggle" aria-label="切换主题">🌙</button>
            </div>
            <button type="button" class="nav-toggle" aria-label="菜单">
                <span class="nav-toggle-text">Menu</span>
                <span class="nav-toggle-dot"></span>
            </button>
        </div>
    </nav>

    <!-- Hero 首屏 -->
    <header id="index" role="banner" data-perspective-group>
        <div class="container">
            <div class="hero-layout">
                <div class="hero-text" data-perspective="header">
                    <!-- JS 填充 -->
                </div>
                <figure class="hero-figure" data-perspective="image">
                    <!-- JS 填充 -->
                </figure>
            </div>
            <div class="hero-social" data-perspective="social-links">
                <!-- JS 填充 -->
            </div>
            <div class="scroll-down-wrap">
                <a href="#content" class="scroll-down" aria-label="向下滚动">
                    <strong class="scroll-down-text">向下</strong>
                    <span class="scroll-down-icon">
                        <svg width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M4.293 8.293a1 1 0 0 1 1.414 0L12 14.586l6.293-6.293a1 1 0 1 1 1.414 1.414l-7 7a1 1 0 0 1-1.414 0l-7-7a1 1 0 0 1 0-1.414"/></svg>
                    </span>
                </a>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main id="content">
        <!-- 关于 -->
        <section id="about" data-nav-section="about">
            <div class="content">
                <h2>关于</h2>
                <div class="about-content">
                    <!-- JS 填充 -->
                </div>
            </div>
            <div class="method-block">
                <div class="method-grid">
                    <!-- JS 填充 -->
                </div>
            </div>
        </section>

        <!-- 项目 -->
        <section id="projects" data-nav-section="projects">
            <div class="content">
                <h2>精选项目</h2>
            </div>
            <div class="projects-container">
                <div class="project-grid">
                    <!-- JS 填充 -->
                </div>
            </div>
        </section>

        <!-- 联系 -->
        <section id="contact" data-nav-section="contact">
            <div class="content">
                <h2>联系</h2>
            </div>
            <div class="contact-container">
                <div class="contact-grid">
                    <!-- JS 填充 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <a href="#index" class="back-to-top">
            <svg width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M4.284 10.295a1 1 0 0 0 1.424 1.404L11 6.329v13.67a1 1 0 1 0 2 0V6.335l5.285 5.364a1 1 0 0 0 1.424-1.404L12.887 3.37a1.25 1.25 0 0 0-1.78 0z"/></svg>
            <span>回到顶部</span>
        </a>
    </footer>

    <script type="module" src="js/resume.js"></script>
</body>
</html>
