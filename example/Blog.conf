# ============================================================
# Blog Nginx 配置（适用于 Termux + Nginx）
# Blog 根目录：/data/data/com.termux/files/home/Blog/Blog
# ============================================================
server {
    listen 7443;
    charset utf-8;

    # ---- API 端点：文件列表（nginx autoindex，由前端 JS 解析）----
    location /api/html/ {
        alias /data/data/com.termux/files/home/Blog/Blog/Html/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    location /api/md/ {
        alias /data/data/com.termux/files/home/Blog/Blog/Markdown/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    location /api/images/ {
        alias /data/data/com.termux/files/home/Blog/Blog/Image/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    # ---- 仪表盘数据（由 corn.sh 定时生成）----
    location = /api/dashboard {
        alias /data/data/com.termux/files/home/Blog/Blog/dashboard.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # ---- 服务导航配置 ----
    location = /config.json {
        alias /data/data/com.termux/files/home/Blog/Blog/config.json;
        default_type application/json;
    }

    # ---- 前端：单页应用 ----
    location / {
        alias /data/data/com.termux/files/home/Blog/Blog/;
        index index.html;
        charset utf-8;
    }
}
