# ============================================================
# Blog Nginx 配置示例（适用于 Termux + Nginx）
# 部署时将所有 /path/to/Blog 替换为实际项目路径
# ============================================================
server {
    listen 7443;
    charset utf-8;

    # ---- API 端点：文件列表（nginx autoindex，由前端 JS 解析）----
    location /api/html/ {
        alias /path/to/Blog/Html/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    location /api/md/ {
        alias /path/to/Blog/Markdown/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    location /api/images/ {
        alias /path/to/Blog/Image/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    # ---- 仪表盘数据（由 corn.sh 定时生成）----
    location /api/dashboard {
        alias /path/to/Blog/dashboard.json;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ---- 服务导航配置 ----
    location /config.json {
        alias /path/to/Blog/config.json;
        default_type application/json;
    }

    # ---- 前端：单页应用（JS/CSS 通过 ?v=N 破坏缓存）----
    location / {
        alias /path/to/Blog/;
        index index.html;
        charset utf-8;
    }
}
