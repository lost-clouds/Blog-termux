# ======================================================
# Blog Nginx 配置
# 适用环境：Termux + Nginx
# Blog 根目录：/data/data/com.termux/files/home/Blog/Blog
# ======================================================
server {
	listen 7443;
	charset utf-8;
	# 文件：$PREFIX/etc/nginx/conf.d/web.conf

	# API 端点 - HTML 文件列表
	location /api/html/ {
		alias /data/data/com.termux/files/home/Blog/Blog/Html/;
		autoindex on;
		autoindex_exact_size off;
		autoindex_localtime on;
		charset utf-8;
	}

	# API 端点 - Markdown 文件列表
	location /api/md/ {
		alias /data/data/com.termux/files/home/Blog/Blog/Markdown/;
		autoindex on;
		autoindex_exact_size off;
		autoindex_localtime on;
		charset utf-8;
	}

	# API 端点 - 图片
	location /api/images/ {
		alias /data/data/com.termux/files/home/Blog/Blog/Image/;
		autoindex on;
		autoindex_exact_size off;
		autoindex_localtime on;
		charset utf-8;
	}

	# Homer 仪表盘
	location /homer/ {
		alias /data/data/com.termux/files/home/Blog/workspace/homer/;
		index index.html;
		autoindex on;
	}
	
	# 仪表盘数据 API —— 返回由系统脚本定时生成的 JSON
	location = /api/dashboard {
		alias /data/data/com.termux/files/home/Blog/Blog/dashboard.json;
		default_type application/json;
		add_header Cache-Control "no-store";
	}

	# 博客页面
	location = /blog {
		alias /data/data/com.termux/files/home/Blog/Blog/blog.html;
	}

	# 图片预览页面
	location = /images {
		alias /data/data/com.termux/files/home/Blog/Blog/images.html;
	}


	# 前端界面根目录
	location / {
		alias /data/data/com.termux/files/home/Blog/Blog/;
		index index.html;
		charset utf-8;
	}

}
