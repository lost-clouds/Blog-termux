# ============================================================
# Resume 个人简历页面 - Nginx 配置
# 端口 7444，与 Blog 项目的 7443 完全隔离
# 用法：将此文件引入 Nginx 主配置
# ============================================================
server {
    listen 7444;
    root /root/Projects/Blog/resume;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 静态资源长缓存
    location ~* \.(css|js|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JSON 配置文件短缓存（便于热更新）
    location ~* \.json$ {
        expires 10s;
        add_header Cache-Control "no-cache";
    }
}
