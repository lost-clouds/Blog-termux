<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f5f7">
    <title>博客 - 控制台</title>
    <link rel="stylesheet" href="lib/apple-theme.css">
    <link rel="stylesheet" href="css/blog.css">
</head>
<body>
    <div class="app">
        <header class="top-bar">
            <a href="/" class="back-btn">← 返回控制台</a>
            <h1>📝 博客文章</h1>
            <div class="search-wrap">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索文章…" autocomplete="off">
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-type="all">全部</button>
                <button class="tab-btn" data-type="markdown">Markdown</button>
                <button class="tab-btn" data-type="html">HTML</button>
            </div>
        </header>
        <div class="article-list" id="articleList">
            <div class="loading">⏳ 加载中…</div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/blog.js"></script>
    <script>
        Theme.initTheme();
        Blog.init();
    </script>
</body>
</html>
